name: Version Extractor
description: >
  Extract and parse a semantic version from a tag, ref, or manual input.
branding:
  icon: 'book'
  color: 'blue'

inputs:
  tag:
    description: 'Tag to extract version from (e.g. v1.3.0). Takes priority over fallback-ref.'
    required: false
    default: ''
  fallback-ref:
    description: 'Fallback ref name when tag is empty'
    required: false
    default: ${{ github.ref_name }}
  prefix:
    description: 'Version prefix to strip (e.g. v)'
    required: false
    default: 'v'
  strict:
    description: 'Whether to strictly validate semver format'
    required: false
    default: 'true'
  extract-pattern:
    description: 'Regex to extract version from raw input (first capture group is used if present)'
    required: false
    default: ''
  fail-on-error:
    description: 'Whether to fail the action when version extraction fails'
    required: false
    default: 'true'

outputs:
  found:
    description: 'Whether a valid version was found (true/false)'
  source:
    description: 'The raw input string before any processing'
  version:
    description: 'Full version string with prefix (e.g. v1.3.0)'
  version-number:
    description: 'Version string without prefix (e.g. 1.3.0)'
  major:
    description: 'Major version number'
  minor:
    description: 'Minor version number'
  patch:
    description: 'Patch version number'
  prerelease:
    description: 'Prerelease identifier (if any)'
  is-prerelease:
    description: 'Whether the version is a prerelease (true/false)'

runs:
  using: node24
  main: dist/index.cjs
